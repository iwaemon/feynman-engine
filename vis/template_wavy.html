<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feynman Diagrams - Textbook Style (k-space)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Helvetica Neue", Arial, sans-serif;
    background: #f5f5f0;
    color: #333;
    padding: 20px;
  }
  h1 { text-align: center; margin-bottom: 24px; font-size: 1.6em; color: #222; }
  .card {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    margin: 0 auto 24px auto;
    max-width: 720px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  .card-title {
    background: #f0f0ea;
    padding: 10px 16px;
    font-size: 1.05em;
    font-weight: 600;
    border-bottom: 1px solid #ddd;
  }
  .card-body { padding: 12px; display: flex; justify-content: center; }
  svg text { font-family: "Helvetica Neue", Arial, sans-serif; }
  .export-bar { text-align: center; margin-bottom: 16px; }
  .export-bar button {
    padding: 8px 20px; font-size: 14px; border: 1px solid #999;
    border-radius: 4px; background: #fff; cursor: pointer; margin: 0 4px;
  }
  .export-bar button:hover { background: #eee; }
</style>
</head>
<body>
<h1>Feynman Diagrams (k-space, Textbook Style)</h1>
<div class="export-bar">
  <button onclick="exportAllSVG()">Export All SVG</button>
  <button onclick="exportCombinedSVG()">Export Combined SVG</button>
</div>
<div id="container"></div>
<script>
function exportAllSVG() {
  document.querySelectorAll('.card').forEach((card, i) => {
    const svg = card.querySelector('svg');
    const clone = svg.cloneNode(true);
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    clone.style.fontFamily = '"Helvetica Neue", Arial, sans-serif';
    const blob = new Blob(['<?xml version="1.0" encoding="UTF-8"?>\n' + clone.outerHTML], {type: 'image/svg+xml'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `diagram_wavy_topo${i+1}.svg`;
    a.click();
    URL.revokeObjectURL(a.href);
  });
}
function exportCombinedSVG() {
  const svgs = document.querySelectorAll('.card svg');
  let totalH = 0;
  const gap = 30;
  const items = [];
  svgs.forEach(svg => {
    const w = +svg.getAttribute('width');
    const h = +svg.getAttribute('height');
    items.push({svg, w, h, y: totalH});
    totalH += h + gap;
  });
  const maxW = Math.max(...items.map(it => it.w));
  let combined = `<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${maxW}" height="${totalH}" style="font-family: Helvetica Neue, Arial, sans-serif; background: white;">`;
  items.forEach((it, i) => {
    const title = document.querySelectorAll('.card-title')[i].textContent.trim();
    combined += `<g transform="translate(0,${it.y})">`;
    combined += `<text x="10" y="16" font-size="13" font-weight="600" fill="#333">${title}</text>`;
    combined += `<g transform="translate(0,20)">${it.svg.innerHTML}</g>`;
    combined += `</g>`;
  });
  combined += '</svg>';
  const blob = new Blob([combined], {type: 'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'diagram_wavy_all.svg';
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>

<script type="module">
import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

const data = __DIAGRAM_JSON__;

const UP = "#2266cc";
const DN = "#cc2222";
const VR = 5;
const W = 600;
const H = 240;
const ML = 80, MR = 80, MT = 30, MB = 50;

function scolor(s) { return s === "Up" ? UP : DN; }
function slabel(s) { return s === "Up" ? "↑" : "↓"; }

// Draw an arrowhead at (x,y) pointing in direction angle
function arrow(g, x, y, angle, color, sz) {
  sz = sz || 5;
  const c = Math.cos(angle), s = Math.sin(angle);
  g.append("polygon")
    .attr("points", `${x},${y} ${x - sz*c + sz*0.45*s},${y - sz*s - sz*0.45*c} ${x - sz*c - sz*0.45*s},${y - sz*s + sz*0.45*c}`)
    .attr("fill", color);
}

// Draw a straight propagator line with midpoint arrow
function drawLine(g, x1, y1, x2, y2, color, opts) {
  opts = opts || {};
  const line = g.append("line")
    .attr("x1", x1).attr("y1", y1).attr("x2", x2).attr("y2", y2)
    .attr("stroke", color).attr("stroke-width", opts.width || 2);
  if (opts.dash) line.attr("stroke-dasharray", opts.dash);
  if (!opts.noarrow) {
    const mx = (x1+x2)/2, my = (y1+y2)/2;
    arrow(g, mx, my, Math.atan2(y2-y1, x2-x1), color, opts.arrowSize || 6);
  }
}

// Draw a quadratic Bezier arc with midpoint arrow
function drawArc(g, x1, y1, x2, y2, bulge, color, label) {
  const mx = (x1+x2)/2, my = (y1+y2)/2 + bulge;
  const p = d3.path();
  p.moveTo(x1, y1);
  p.quadraticCurveTo(mx, my, x2, y2);
  g.append("path").attr("d", p.toString())
    .attr("fill", "none").attr("stroke", color).attr("stroke-width", 2);
  // Arrow at t=0.5
  const t = 0.5;
  const bx = (1-t)*(1-t)*x1 + 2*(1-t)*t*mx + t*t*x2;
  const by = (1-t)*(1-t)*y1 + 2*(1-t)*t*my + t*t*y2;
  const tx = 2*(1-t)*(mx-x1) + 2*t*(x2-mx);
  const ty = 2*(1-t)*(my-y1) + 2*t*(y2-my);
  arrow(g, bx, by, Math.atan2(ty, tx), color, 5);
  if (label) {
    g.append("text").attr("x", mx).attr("y", my + (bulge < 0 ? -7 : 14))
      .attr("text-anchor", "middle").attr("font-size", "10px")
      .attr("font-style", "italic").attr("fill", color).text(label);
  }
}

// Draw a circle (tadpole loop) with arrow at top
function drawLoop(g, cx, cy, r, color, label) {
  g.append("circle").attr("cx", cx).attr("cy", cy).attr("r", r)
    .attr("fill", "none").attr("stroke", color).attr("stroke-width", 2);
  // Arrow at top of circle, pointing right
  arrow(g, cx + 2, cy - r, 0, color, 4);
  if (label) {
    g.append("text").attr("x", cx + r + 5).attr("y", cy + 4)
      .attr("text-anchor", "start").attr("font-size", "10px")
      .attr("font-style", "italic").attr("fill", color).text(label);
  }
}

// Draw a wavy (sine) line between two points
function drawWavy(g, x1, y1, x2, y2, color) {
  const dx = x2-x1, dy = y2-y1;
  const len = Math.sqrt(dx*dx + dy*dy);
  const periods = Math.max(3, Math.round(len / 15));
  const amp = 4;
  const nx = -dy/len, ny = dx/len; // normal direction
  const pts = [];
  const steps = periods * 16;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const px = x1 + dx*t + amp * Math.sin(2*Math.PI*periods*t) * nx;
    const py = y1 + dy*t + amp * Math.sin(2*Math.PI*periods*t) * ny;
    pts.push([px, py]);
  }
  g.append("path").attr("d", d3.line().curve(d3.curveBasis)(pts))
    .attr("fill", "none").attr("stroke", color).attr("stroke-width", 1.5);
}

// Vertex dot
function drawVertex(g, x, y, label) {
  g.append("circle").attr("cx", x).attr("cy", y).attr("r", VR)
    .attr("fill", "#000");
  if (label) {
    g.append("text").attr("x", x).attr("y", y + VR + 14)
      .attr("text-anchor", "middle").attr("font-size", "11px")
      .attr("font-weight", "600").attr("fill", "#555").text(label);
  }
}

// Endpoint dot (open circle)
function drawEndpoint(g, x, y, label, anchor) {
  g.append("circle").attr("cx", x).attr("cy", y).attr("r", 3)
    .attr("fill", "#fff").attr("stroke", "#333").attr("stroke-width", 1.5);
  if (label) {
    const tx = anchor === "end" ? x - 10 : x + 10;
    g.append("text").attr("x", tx).attr("y", y + 4)
      .attr("text-anchor", anchor || "start")
      .attr("font-size", "12px").attr("font-style", "italic").attr("fill", "#333")
      .text(label);
  }
}

/* ================================================================ */
/*  Analyze and render each diagram                                 */
/* ================================================================ */

function render(svg, diag, topoId) {
  const verts = diag.vertices;
  const props = diag.propagators;
  const vIds = verts.map(v => v.id).sort((a,b) => a-b);
  const maxVId = Math.max(...vIds);
  const EXT_IN = 0, EXT_OUT = maxVId + 1;
  const vSet = new Set(vIds);

  // Classify propagators
  const selfLoops = [], extProps = [], intEdges = [], discExt = [];
  props.forEach(p => {
    if (p.from === p.to && vSet.has(p.from)) selfLoops.push(p);
    else if (p.external) {
      if (vSet.has(p.from) || vSet.has(p.to)) extProps.push(p);
      else discExt.push(p);
    } else intEdges.push(p);
  });

  // Find main chain: trace ext_in → ... → ext_out
  const fromIn = extProps.filter(p => p.from === EXT_IN);
  const toOut = extProps.filter(p => p.to === EXT_OUT);
  let mainVerts = []; // ordered vertices on the main chain
  let mainIntEdges = new Set(); // indices of internal edges used in main chain

  if (fromIn.length > 0 && toOut.length > 0) {
    const vStart = fromIn.find(p => vSet.has(p.to));
    const vEnd = toOut.find(p => vSet.has(p.from));
    if (vStart && vEnd) {
      if (vStart.to === vEnd.from) {
        mainVerts = [vStart.to];
      } else {
        mainVerts = [vStart.to, vEnd.from];
        // Find the connecting internal edge
        const ci = intEdges.findIndex(p =>
          (p.from === vStart.to && p.to === vEnd.from) ||
          (p.from === vEnd.from && p.to === vStart.to));
        if (ci >= 0) mainIntEdges.add(ci);
      }
    }
  }

  const isConnected = mainVerts.length > 0;
  const mainVertSet = new Set(mainVerts);
  const discVerts = vIds.filter(v => !mainVertSet.has(v));

  // Above edges = internal edges NOT on main chain
  const aboveEdges = intEdges.filter((_, i) => !mainIntEdges.has(i));

  // Positions
  const g = svg.append("g");
  const mainY = H - MB;
  const inX = ML - 20, outX = W - MR + 20;
  const usable = W - ML - MR;
  const pos = {};
  pos[EXT_IN] = inX;
  pos[EXT_OUT] = outX;

  if (isConnected) {
    if (mainVerts.length === 1) {
      pos[mainVerts[0]] = W / 2;
    } else {
      mainVerts.forEach((v, i) => {
        pos[v] = ML + usable * (i + 1) / (mainVerts.length + 1);
      });
    }
  }

  // Place disconnected vertices above
  const aboveY = mainY - 100;
  if (discVerts.length === 1) {
    pos[discVerts[0]] = W / 2;
  } else if (discVerts.length === 2) {
    pos[discVerts[0]] = W / 2 - 70;
    pos[discVerts[1]] = W / 2 + 70;
  }

  let li = 0; // label index

  // ---- Draw disconnected external line ----
  if (discExt.length > 0) {
    const ey = isConnected ? mainY + 25 : mainY;
    drawLine(g, inX, ey, outX, ey, "#888", { dash: "8,4" });
    g.append("text").attr("x", (inX+outX)/2).attr("y", ey - 8)
      .attr("text-anchor", "middle").attr("font-size", "10px")
      .attr("font-style", "italic").attr("fill", scolor(discExt[0].spin))
      .text(`k${slabel(discExt[0].spin)}`);
    drawEndpoint(g, inX, ey, "τ", "end");
    drawEndpoint(g, outX, ey, "0", "start");
  }

  // ---- Draw main chain ----
  if (isConnected) {
    // Build ordered chain: EXT_IN, v1, (v2), EXT_OUT
    const chain = [EXT_IN, ...mainVerts, EXT_OUT];
    // Find the propagator for each segment to get the spin
    for (let i = 0; i < chain.length - 1; i++) {
      const f = chain[i], t = chain[i+1];
      // Find matching propagator
      let seg = props.find(p => {
        if (p.from === f && p.to === t) return true;
        // For internal edges on main chain, direction might be reversed
        if (!p.external && ((p.from === f && p.to === t) || (p.from === t && p.to === f))) return true;
        return false;
      });
      const spin = seg ? seg.spin : "Up";
      const color = scolor(spin);
      drawLine(g, pos[f], mainY, pos[t], mainY, color, { width: 2.5 });
      const mx = (pos[f] + pos[t]) / 2;
      g.append("text").attr("x", mx).attr("y", mainY + 18)
        .attr("text-anchor", "middle").attr("font-size", "10px")
        .attr("font-style", "italic").attr("fill", color)
        .text(i === 0 && chain.length > 2 ? `k${slabel(spin)}` :
              i === chain.length - 2 && chain.length > 2 ? `k${slabel(spin)}` :
              `k${li}${slabel(spin)}`);
      li++;
    }
    drawEndpoint(g, inX, mainY, "τ", "end");
    drawEndpoint(g, outX, mainY, "0", "start");
  }

  // ---- Draw self-loops (tadpoles) ----
  const loopsByV = {};
  selfLoops.forEach(p => {
    if (!loopsByV[p.from]) loopsByV[p.from] = [];
    loopsByV[p.from].push(p);
  });

  Object.entries(loopsByV).forEach(([vid, loops]) => {
    vid = parseInt(vid);
    const vx = pos[vid];
    const vy = mainVertSet.has(vid) ? mainY : aboveY;
    const loopR = 14;

    loops.forEach((p, i) => {
      const offsetX = loops.length > 1 ? (i - (loops.length-1)/2) * 34 : 0;
      const topOfDash = vy - VR - 25;
      const loopCy = topOfDash - loopR;
      const cx = vx + offsetX;
      const color = scolor(p.spin);

      // Dashed interaction line from vertex up to loop
      drawWavy(g, cx, vy - VR, cx, loopCy + loopR, "#333");

      // Tadpole circle
      drawLoop(g, cx, loopCy, loopR, color, `k${li}${slabel(p.spin)}`);
      li++;
    });
  });

  // ---- Draw above edges (between different vertices, not on main chain) ----
  const edgeGroups = {};
  aboveEdges.forEach(p => {
    const key = Math.min(p.from, p.to) + "-" + Math.max(p.from, p.to);
    if (!edgeGroups[key]) edgeGroups[key] = [];
    edgeGroups[key].push(p);
  });

  Object.entries(edgeGroups).forEach(([key, edges]) => {
    const [v1, v2] = key.split("-").map(Number);
    const x1 = pos[v1], x2 = pos[v2];
    const bothMain = mainVertSet.has(v1) && mainVertSet.has(v2);
    const baseY = bothMain ? mainY : aboveY;

    if (edges.length >= 2) {
      // Bubble: two antiparallel arcs
      // Draw wavy interaction lines from vertices up to the bubble
      const bubbleBaseY = baseY - 45;
      if (bothMain) {
        drawWavy(g, x1, baseY - VR, x1, bubbleBaseY, "#333");
        drawWavy(g, x2, baseY - VR, x2, bubbleBaseY, "#333");
        g.append("text").attr("x", x1 - 10).attr("y", (baseY + bubbleBaseY)/2)
          .attr("text-anchor", "end").attr("font-size", "10px")
          .attr("font-style", "italic").attr("fill", "#333").text("q");
      }

      edges.forEach((e, i) => {
        const color = scolor(e.spin);
        const bulge = i === 0 ? -30 : 30;
        const lbl = `k${li}${slabel(e.spin)}`;
        if (e.from <= e.to) {
          drawArc(g, x1, bubbleBaseY, x2, bubbleBaseY, bulge, color, lbl);
        } else {
          drawArc(g, x2, bubbleBaseY, x1, bubbleBaseY, bulge, color, lbl);
        }
        li++;
      });
    } else {
      // Single arc above
      const e = edges[0];
      const color = scolor(e.spin);
      const lbl = `k${li}${slabel(e.spin)}`;
      const bulge = -50;
      if (bothMain) {
        drawWavy(g, x1, baseY - VR, x1, baseY - 30, "#333");
      }
      if (e.from <= e.to) {
        drawArc(g, x1, baseY, x2, baseY, bulge, color, lbl);
      } else {
        drawArc(g, x2, baseY, x1, baseY, bulge, color, lbl);
      }
      li++;
    }
  });

  // ---- Draw disconnected vertex interaction lines ----
  if (discVerts.length > 0 && !isConnected) {
    // Draw wavy lines from disconnected external line up to vertices
    discVerts.forEach(vid => {
      drawWavy(g, pos[vid], mainY - VR, pos[vid], aboveY + VR, "#333");
    });
    // q label
    if (discVerts.length >= 1) {
      g.append("text").attr("x", pos[discVerts[0]] - 12)
        .attr("y", (mainY + aboveY) / 2)
        .attr("text-anchor", "end").attr("font-size", "10px")
        .attr("font-style", "italic").attr("fill", "#333").text("q");
    }
  }

  // ---- Draw vertices (on top) ----
  mainVerts.forEach(v => drawVertex(g, pos[v], mainY, `τ${v}`));
  discVerts.forEach(v => drawVertex(g, pos[v], aboveY, `τ${v}`));
}

/* ================================================================ */
/*  Build cards                                                     */
/* ================================================================ */
const container = d3.select("#container");

data.diagrams.forEach(entry => {
  const card = container.append("div").attr("class", "card");
  card.append("div").attr("class", "card-title")
    .text(`Topology ${entry.topology_id} (weight = ${entry.weight})`);
  const body = card.append("div").attr("class", "card-body");

  const diag = entry.diagram;
  const vIds = diag.vertices.map(v => v.id);
  const vSet = new Set(vIds);
  const hasDisc = diag.propagators.some(p =>
    p.external && !vSet.has(p.from) && !vSet.has(p.to));
  const h = hasDisc ? H + 30 : H;

  const svg = body.append("svg")
    .attr("width", W).attr("height", h)
    .attr("viewBox", `0 0 ${W} ${h}`);
  render(svg, diag, entry.topology_id);
});

</script>
</body>
</html>
